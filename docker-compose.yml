services:
  db:
    image: postgres:18.4-alpine
    container_name: postgres
    ports:
      - 15432:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: sampledb
      LANG: ja_JP.utf8
    volumes:
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  cache:
    image: redis:8.6.3-alpine
    container_name: redis
    ports:
      - 16379:6379
    command: redis-server --save 20 1 --loglevel warning --requirepass adminpass

  mq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=adminpass

  dynamodb-setup:
    image: busybox:1.37.0
    container_name: dynamodb-setup
    command: ["sh", "-c", "mkdir -p /data && chown -R 1000:1000 /data"]
    volumes:
      - ./data:/data

  dynamodb:
    image: amazon/dynamodb-local:3.3.0
    container_name: dynamodb
    user: "1000:1000"
    ports:
      - 18000:8000
    environment:
      - AWS_PROFILE=local
      - AWS_REGION=us-west-1
    volumes:
      - ./data:/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully

  dynamodb-init:
    image: amazon/aws-cli:2.34.52
    container_name: dynamodb-init
    depends_on:
      - dynamodb
    environment:
      - AWS_PROFILE=local
      - AWS_REGION=us-west-1
    volumes:
      - ./init-dynamodb.d:/init-dynamodb.d
      - .aws:/root/.aws
    entrypoint: ["/bin/bash", "/init-dynamodb.d/init.sh"]
